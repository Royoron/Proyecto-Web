<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StyleUp – Mi Cuenta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="estilos.css"/>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>
 
<div class="overlay-sidebar" id="overlay" onclick="cerrarSidebar()"></div>
 
<!-- ══ SIDEBAR ══ -->
<aside class="sidebar" id="sidebar">
 
  <div class="sidebar-header">
    <a class="navbar-brand" href="index.html">Style<span>Up</span></a>
  </div>
 
  <div class="sidebar-usuario">
    <div class="avatar-barbero" style="width:42px;height:42px;font-size:1rem;margin:0;flex-shrink:0;" id="avatarSidebar">R</div>
    <div style="overflow:hidden;">
      <div style="font-size:.88rem;font-weight:500;color:var(--claro);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="nombreSidebar">Juan Pérez</div>
      <div style="font-size:.72rem;color:var(--gris);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="emailSidebar">juan@styleup.com</div>
    </div>
  </div>
 
  <nav class="sidebar-nav">
    <div class="nav-seccion-label">Principal</div>
    <div class="nav-item-dash activo" onclick="mostrarPanel('inicio')">
      <i class="bi bi-grid-1x2"></i> Inicio
    </div>
 
    <div class="nav-seccion-label">Citas</div>
    <div class="nav-item-dash" onclick="mostrarPanel('reservar')">
      <i class="bi bi-calendar-plus"></i> Nueva reserva
    </div>
    <div class="nav-item-dash" onclick="mostrarPanel('miscitas')">
      <i class="bi bi-calendar-check"></i> Mis citas
    </div>
    <div class="nav-item-dash" onclick="mostrarPanel('historial')">
      <i class="bi bi-clock-history"></i> Historial
    </div>
 
    <div class="nav-seccion-label">Cuenta</div>
    <div class="nav-item-dash" onclick="mostrarPanel('perfil')">
      <i class="bi bi-person"></i> Mi perfil
    </div>
  </nav>
 
  <div class="sidebar-footer">
    <button class="btn-cerrar-sesion" onclick="cerrarSesion()">
      <i class="bi bi-box-arrow-left"></i> Cerrar sesión
    </button>
  </div>
</aside>
